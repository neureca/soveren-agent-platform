name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  pypi:
    name: Publish to PyPI
    needs: sandbox-image
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/soveren-agent-platform
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v${package_version}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.1
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  sandbox-image:
    name: Publish sandbox image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v${package_version}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/neureca/soveren-codex-sandbox
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Generate egress image metadata
        id: egress-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/neureca/soveren-sandbox-egress
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/sandbox/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and publish egress image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/sandbox/Egress.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.egress-meta.outputs.tags }}
          labels: ${{ steps.egress-meta.outputs.labels }}

      - name: Verify images are publicly pullable
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker logout ghcr.io
          docker pull "ghcr.io/neureca/soveren-codex-sandbox:${VERSION}"
          docker pull "ghcr.io/neureca/soveren-sandbox-egress:${VERSION}"
