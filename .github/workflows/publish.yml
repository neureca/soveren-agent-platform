name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate release on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release tag and main ancestry
        shell: bash
        run: |
          package_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v${package_version}"
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Check lockfile
        run: uv lock --check

      - name: Lint
        run: uv run ruff check src tests scripts deploy/sandbox/credential_broker.py

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest

      - name: Validate release metadata
        run: uv run python scripts/validate_release.py

      - name: Smoke test sandbox image and egress boundary
        if: matrix.python-version == '3.13'
        run: bash scripts/smoke_sandbox.sh

  build-package:
    name: Build package artifact
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uv run twine check dist/*

      - name: Verify typed package marker
        run: unzip -l dist/*.whl | grep -F soveren_agent_platform/py.typed

      - name: Upload distributions
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  pypi:
    name: Publish to PyPI
    needs:
      - build-package
      - sandbox-image
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/soveren-agent-platform
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  sandbox-image:
    name: Publish sandbox image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/neureca/soveren-codex-sandbox
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Generate egress image metadata
        id: egress-meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/neureca/soveren-sandbox-egress
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Generate credential broker image metadata
        id: broker-meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/neureca/soveren-credential-broker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and publish sandbox image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/sandbox/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and publish egress image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/sandbox/Egress.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.egress-meta.outputs.tags }}
          labels: ${{ steps.egress-meta.outputs.labels }}

      - name: Build and publish credential broker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/sandbox/CredentialBroker.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.broker-meta.outputs.tags }}
          labels: ${{ steps.broker-meta.outputs.labels }}

      - name: Verify images are publicly pullable
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker logout ghcr.io
          docker pull "ghcr.io/neureca/soveren-codex-sandbox:${VERSION}"
          docker pull "ghcr.io/neureca/soveren-sandbox-egress:${VERSION}"
          docker pull "ghcr.io/neureca/soveren-credential-broker:${VERSION}"
