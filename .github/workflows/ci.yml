name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Check lockfile
        run: uv lock --check

      - name: Lint
        run: uv run ruff check src tests scripts deploy/sandbox/credential_broker.py

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest

      - name: Validate release metadata
        run: uv run python scripts/validate_release.py

      - name: Build distributions
        run: uv build

      - name: Verify source distribution inventory
        run: uv run python scripts/validate_sdist.py dist/*.tar.gz

      - name: Check distributions
        run: uv run twine check dist/*

  telegram-extra:
    name: Telegram extra
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true

      - name: Install Telegram extra
        run: uv sync --group dev --extra telegram --locked

      - name: Test Telegram integration
        run: uv run pytest tests/test_telegram_ingress.py tests/test_telegram_ptb_adapter.py

  sandbox-image:
    name: Sandbox image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Smoke test sandbox image and egress boundary
        run: bash scripts/smoke_sandbox.sh
