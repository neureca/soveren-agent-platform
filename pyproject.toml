[project]
name = "agent-platform"
version = "0.1.0"
description = "Reusable runtime core for durable agent applications."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "python-dateutil>=2.8",
]

[dependency-groups]
dev = [
    "pytest>=8",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
